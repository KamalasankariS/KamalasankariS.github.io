<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Terminal/code window -->
  <rect x="10" y="20" width="100" height="80" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="4"/>
  <!-- Title bar -->
  <rect x="10" y="20" width="100" height="18" rx="6" fill="#1a1a2e"/>
  <rect x="10" y="32" width="100" height="6" fill="#1a1a2e"/>
  <!-- Window dots -->
  <circle cx="24" cy="29" r="3" fill="#FF3CAC"/>
  <circle cx="34" cy="29" r="3" fill="#FFD93D"/>
  <circle cx="44" cy="29" r="3" fill="#5EF2C2"/>
  <!-- Code lines -->
  <rect x="22" y="48" width="40" height="4" rx="2" fill="#FF3CAC"/>
  <rect x="22" y="58" width="55" height="4" rx="2" fill="#6EDCFF"/>
  <rect x="30" y="68" width="35" height="4" rx="2" fill="#FFD93D"/>
  <rect x="30" y="78" width="48" height="4" rx="2" fill="#5EF2C2"/>
  <rect x="22" y="88" width="25" height="4" rx="2" fill="#B8FF3C"/>
  <!-- Cursor blink -->
  <rect x="52" y="86" width="3" height="8" rx="1" fill="#FF3CAC"/>
</svg>
