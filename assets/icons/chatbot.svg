<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Retro CRT TV — comic style -->
  <!-- Rabbit ear antennas -->
  <line x1="72" y1="30" x2="55" y2="5" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="30" x2="145" y2="5" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="53" cy="4" r="5" fill="#FF3CAC" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="147" cy="4" r="5" fill="#FF3CAC" stroke="#1a1a1a" stroke-width="3"/>
  <!-- TV body — chunky rounded rectangle -->
  <rect x="20" y="28" width="160" height="130" rx="14" ry="14"
        fill="#FFD93D" stroke="#1a1a1a" stroke-width="5.5" stroke-linejoin="round"/>
  <!-- Screen bezel — inset dark frame -->
  <rect x="32" y="40" width="112" height="90" rx="8" ry="8"
        fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Screen — the glass -->
  <rect x="38" y="46" width="100" height="78" rx="5" ry="5"
        fill="#5EC8E5"/>
  <!-- Screen static noise lines -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
    <line x1="42" y1="56" x2="78" y2="56"/>
    <line x1="85" y1="56" x2="132" y2="56"/>
    <line x1="42" y1="68" x2="60" y2="68"/>
    <line x1="68" y1="68" x2="105" y2="68"/>
    <line x1="112" y1="68" x2="132" y2="68"/>
    <line x1="42" y1="80" x2="95" y2="80"/>
    <line x1="102" y1="80" x2="132" y2="80"/>
    <line x1="42" y1="92" x2="55" y2="92"/>
    <line x1="62" y1="92" x2="118" y2="92"/>
    <line x1="42" y1="104" x2="88" y2="104"/>
    <line x1="95" y1="104" x2="132" y2="104"/>
    <line x1="42" y1="116" x2="70" y2="116"/>
    <line x1="78" y1="116" x2="132" y2="116"/>
  </g>
  <!-- Screen glare -->
  <path d="M42 48 L70 48 L42 70 Z" fill="rgba(255,255,255,0.25)"/>
  <!-- Control panel — right side knobs -->
  <circle cx="156" cy="58" r="9" fill="#FF3CAC" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="156" y1="52" x2="156" y2="58" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="156" cy="82" r="9" fill="#5EF2C2" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="156" y1="76" x2="156" y2="82" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Speaker grille — bottom right -->
  <g stroke="#1a1a1a" stroke-width="2">
    <line x1="148" y1="100" x2="164" y2="100"/>
    <line x1="148" y1="107" x2="164" y2="107"/>
    <line x1="148" y1="114" x2="164" y2="114"/>
    <line x1="148" y1="121" x2="164" y2="121"/>
  </g>
  <!-- Legs -->
  <rect x="42" y="156" width="14" height="18" rx="3" fill="#1a1a1a"/>
  <rect x="144" y="156" width="14" height="18" rx="3" fill="#1a1a1a"/>
  <!-- Feet -->
  <rect x="38" y="172" width="22" height="6" rx="3" fill="#1a1a1a"/>
  <rect x="140" y="172" width="22" height="6" rx="3" fill="#1a1a1a"/>
  <!-- Halftone on TV body -->
  <g opacity="0.08">
    <circle cx="35" cy="140" r="2" fill="#1a1a1a"/>
    <circle cx="50" cy="145" r="2" fill="#1a1a1a"/>
    <circle cx="65" cy="140" r="2" fill="#1a1a1a"/>
    <circle cx="80" cy="145" r="2" fill="#1a1a1a"/>
    <circle cx="95" cy="140" r="2" fill="#1a1a1a"/>
    <circle cx="110" cy="145" r="2" fill="#1a1a1a"/>
    <circle cx="125" cy="140" r="2" fill="#1a1a1a"/>
  </g>
</svg>
