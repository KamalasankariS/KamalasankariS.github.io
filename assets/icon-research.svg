<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Brain/neural network icon -->
  <!-- Central node -->
  <circle cx="60" cy="55" r="12" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="60" cy="55" r="5" fill="#FF3CAC"/>
  <!-- Top nodes -->
  <circle cx="40" cy="25" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="40" cy="25" r="3" fill="#FFD93D"/>
  <circle cx="80" cy="25" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="80" cy="25" r="3" fill="#6EDCFF"/>
  <!-- Side nodes -->
  <circle cx="22" cy="60" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="22" cy="60" r="3" fill="#5EF2C2"/>
  <circle cx="98" cy="60" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="98" cy="60" r="3" fill="#B8FF3C"/>
  <!-- Bottom nodes -->
  <circle cx="35" cy="90" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="35" cy="90" r="3" fill="#FF3CAC"/>
  <circle cx="85" cy="90" r="8" fill="#fff" stroke="#1a1a2e" stroke-width="3"/>
  <circle cx="85" cy="90" r="3" fill="#FFD93D"/>
  <!-- Connections -->
  <line x1="48" y1="47" x2="40" y2="33" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="72" y1="47" x2="80" y2="33" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="48" y1="55" x2="30" y2="58" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="72" y1="55" x2="90" y2="58" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="52" y1="65" x2="40" y2="83" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="68" y1="65" x2="80" y2="83" stroke="#1a1a2e" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Cross connections -->
  <line x1="40" y1="33" x2="22" y2="52" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="80" y1="33" x2="98" y2="52" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="30" y1="60" x2="35" y2="82" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
  <line x1="90" y1="60" x2="85" y2="82" stroke="#1a1a2e" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
  <!-- Publication sparkles -->
  <text x="55" y="112" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">AI</text>
</svg>
